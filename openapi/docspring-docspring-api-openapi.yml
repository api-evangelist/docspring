                  template_version: 1.0.0
                - type: template
                  id: tpl_1234567890abcdef01
                - type: submission
                  id: sub_1234567890abcdef02
                - type: custom_file
                  id: cfi_1234567890abcdef01
                - type: combined_submission
                  id: com_1234567890abcdef01
                - type: url
