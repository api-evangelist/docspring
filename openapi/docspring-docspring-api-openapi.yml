        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                delete_custom_files:
                  type: boolean
                expires_in:
                  type: integer
                metadata:
                  type: object
                password:
                  type: string
                source_pdfs:
                  items:
                    additionalProperties: false
                    properties:
                      id:
                        type: string
                      template_version:
                        type: string
                      type:
                        enum:
                        - submission
                        - combined_submission
                        - template
                        - custom_file
                        - url
                        type: string
                      url:
                        format: uri
                        type: string
                    required:
                    - type
                    type: object
                  type: array
                test:
                  type: boolean
              required:
              - source_pdfs
              title: combine_pdfs_data
              type: object
              example:
                source_pdfs:
                - type: submission
                  id: sub_1234567890abcdef01
                - type: template
