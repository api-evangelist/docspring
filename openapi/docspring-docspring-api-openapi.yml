openapi: 3.0.3
info:
  title: DocSpring API
  description: Use DocSpring's API to programmatically fill out PDF forms, convert
    HTML to PDFs, merge PDFs, or request legally binding e-signatures.
  version: v1
  contact:
    url: https://docspring.com/docs/
  license:
    name: Proprietary
externalDocs:
  url: https://docspring.com/docs/
  description: DocSpring API Documentation
servers:
- url: https://sync.api.docspring.com/api/v1
  description: DocSpring API
security:
- basicAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: 'Username: API Token ID, Password: API Token Secret'
  schemas:
    error_or_multiple_errors_response:
      type: object
      title: error_or_multiple_errors_response
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: string
          description: Single error message (when only one error occurred)
        errors:
          type: array
          items:
            type: string
          description: Array of error messages (when multiple validation errors occurred)
      required:
      - status
      additionalProperties: false
    error_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: string
      required:
      - status
      - error
      additionalProperties: false
      title: error_response
    json_schema:
      type: object
      properties:
        $schema:
          type: string
          format: uri
        id:
          type: string
          format: uri-reference
        title:
          type: string
        description:
          type: string
        definitions:
          type: object
          default: {}
        type:
          type: string
        properties:
          type: object
        additionalProperties:
          type: boolean
        required:
          type: array
          items:
            type: string
      additionalProperties: false
      title: json_schema
    multiple_errors_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        errors:
          type: array
          items:
            type: string
      required:
      - status
      - errors
      additionalProperties: false
      title: multiple_errors_response
    submission_422_response:
      type: object
      title: submission_422_response
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: string
          description: Single error message (for non-validation errors)
        submission:
          $ref: '#/components/schemas/submission_preview'
          description: The submission object with validation errors (for validation
            errors)
        errors:
          type: array
          items:
            type: string
          description: Array of validation error messages (when submission data is
            invalid)
      required:
      - status
      additionalProperties: false
    success_error_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        error:
          type: string
      required:
      - status
      additionalProperties: false
      title: success_error_response
    success_multiple_errors_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        errors:
          type: array
          items:
            type: string
      required:
      - status
      additionalProperties: false
      title: success_multiple_errors_response
    template_add_fields_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        errors:
          type: array
          items:
            type: string
        new_field_ids:
          type: array
          items:
            type: integer
      required:
      - status
      additionalProperties: false
      title: template_add_fields_response
    template_delete_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        errors:
          type: array
          items:
            type: string
        latest_version:
          type: string
          nullable: true
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: string
              description:
                type: string
                nullable: true
              published_at:
                type: string
              published_by_id:
                type: string
            required:
            - version
            - published_at
            - published_by_id
            additionalProperties: false
      required:
      - status
      additionalProperties: false
      title: template_delete_response
    template_publish_version_response:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
        result:
          type: object
          additionalProperties: false
          properties:
            version:
              type: string
            description:
              type: string
              nullable: true
            published_by_id:
              type: string
            published_at:
              type: string
              format: date-time
          required:
          - version
          - published_by_id
          - published_at
        errors:
          type: array
          items:
            type: string
      required:
      - status
      - result
      additionalProperties: false
      title: template_publish_version_response
    upload_presign_response:
      type: object
      properties:
        fields:
          type: object
          properties:
            key:
              type: string
            policy:
              type: string
            x-amz-algorithm:
              type: string
            x-amz-credential:
              type: string
            x-amz-date:
              type: string
            x-amz-signature:
              type: string
          required:
          - key
          - policy
          - x-amz-algorithm
          - x-amz-credential
          - x-amz-date
          - x-amz-signature
          additionalProperties: false
        headers:
          type: object
        url:
          type: string
        method:
          type: string
          enum:
          - post
      required:
      - fields
      - headers
      - url
      additionalProperties: false
      title: upload_presign_response
    combined_submission_action:
      title: combined_submission_action
      type: object
      properties:
        id:
          type: string
          nullable: true
        integration_id:
          type: string
          nullable: true
        state:
          type: string
          enum:
          - pending
          - processed
          - failed
          - error
        action_type:
          type: string
          enum:
          - webhook
          - slack_webhook
          - email
          - aws_s3_upload
          nullable: true
        action_category:
          type: string
          enum:
          - notification
          - file_upload
        result_data:
          type: object
        error_message:
          type: string
          nullable: true
      required:
      - action_category
      - action_type
      - error_message
      - id
      - integration_id
      - result_data
      - state
      additionalProperties: false
    combined_submission:
      title: combined_submission
      type: object
      properties:
        id:
          type: string
          nullable: true
        state:
          type: string
          enum:
          - pending
          - processed
          - error
        expired:
          type: boolean
        expires_in:
          type: integer
          nullable: true
        expires_at:
          type: string
          nullable: true
        processed_at:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        submission_ids:
          type: array
          items:
            type: string
        source_pdfs:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
                enum:
                - combined_submission
                - custom_file
                - submission
                - template
                - url
              template_version:
                type: string
              url:
                type: string
                format: uri
            required:
            - type
            additionalProperties: false
        metadata:
          type: object
        password:
          type: string
          nullable: true
        pdf_hash:
          type: string
          nullable: true
        download_url:
          type: string
          nullable: true
        actions:
          type: array
          items:
            $ref: '#/components/schemas/combined_submission_action'
      required:
      - actions
      - download_url
      - error_message
      - expired
      - expires_at
      - expires_in
      - id
      - metadata
      - password
      - pdf_hash
      - processed_at
      - source_pdfs
      - state
      - submission_ids
      additionalProperties: false
    custom_file:
      title: custom_file
      type: object
      properties:
        id:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
      required:
      - id
      - url
      additionalProperties: false
    folder:
      title: folder
      type: object
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        parent_folder_id:
          type: string
          nullable: true
      required:
      - id
      - name
      - parent_folder_id
      - path
      additionalProperties: false
    submission_action:
      title: submission_action
      type: object
      properties:
        id:
          type: string
          nullable: true
        integration_id:
          type: string
          nullable: true
        state:
          type: string
          enum:
          - pending
          - processed
          - failed
          - error
        action_type:
          type: string
          enum:
          - webhook
          - slack_webhook
          - email
          - aws_s3_upload
        action_category:
          type: string
          enum:
          - notification
          - file_upload
        result_data:
          type: object
        error_message:
          type: string
          nullable: true
      required:
      - action_category
      - action_type
      - error_message
      - id
      - integration_id
      - result_data
      - state
      additionalProperties: false
    submission_batch:
      title: submission_batch
      type: object
      properties:
        id:
          type: string
          nullable: true
        state:
          type: string
          enum:
          - pending
          - processed
          - error
        metadata:
          type: object
        processed_at:
          type: string
          nullable: true
        total_count:
          type: integer
        pending_count:
          type: integer
        error_count:
          type: integer
        completion_percentage:
          type: number
      required:
      - completion_percentage
      - error_count
      - id
      - metadata
      - pending_count
      - processed_at
      - state
      - total_count
      additionalProperties: false
    submission_batch_with_submissions:
      title: submission_preview
      type: object
      properties:
        id:
