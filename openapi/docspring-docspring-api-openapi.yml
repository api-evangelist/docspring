      tags:
      - Authentication
      responses:
        '200':
          description: authentication succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success_error_response'
              example:
                status: success
        '401':
          description: authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success_error_response'
              example:
                status: error
                error: 'Could not find API token with ID: missing_api_token'
